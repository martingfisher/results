<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="880" viewBox="0 0 1240 880" role="img" aria-labelledby="title desc" font-family="'DM Sans', system-ui, sans-serif">
  <title id="title">Lighthouse before and after: replacing Elfsight with our own form</title>
  <desc id="desc">Four PageSpeed Insights summaries in a two-by-two grid. Top row Before: mobile shows Performance 90 / Accessibility 96 / Best Practices 100 / SEO 100; desktop shows 70 / 96 / 100 / 100. Bottom row After: both mobile and desktop show 100 / 100 / 100 / 100. Total Blocking Time goes from 400ms / 610ms to zero on both axes.</desc>

  <rect width="1240" height="880" fill="#070630"/>

  <!-- Header -->
  <text x="48" y="60" font-size="12" font-weight="700" letter-spacing="2" fill="#d6262a">PAGESPEED INSIGHTS — /CONTACT/</text>
  <text x="48" y="98" font-size="28" font-weight="700" fill="#ffffff">Same URL. Same week. One widget removed.</text>

  <!-- ====================== BEFORE ROW ====================== -->
