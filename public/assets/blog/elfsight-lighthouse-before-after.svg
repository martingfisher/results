      <text x="110" y="170" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(255,255,255,0.78)">Performance</text>

      <circle cx="220" cy="110" r="32" fill="rgba(25,195,125,0.12)" stroke="#19c37d" stroke-width="3"/>
      <text x="220" y="118" text-anchor="middle" font-size="22" font-weight="700" fill="#19c37d">96</text>
      <text x="220" y="170" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(255,255,255,0.78)">Accessibility</text>

      <circle cx="370" cy="110" r="32" fill="rgba(25,195,125,0.12)" stroke="#19c37d" stroke-width="3"/>
      <text x="370" y="118" text-anchor="middle" font-size="22" font-weight="700" fill="#19c37d">100</text>
      <text x="370" y="170" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(255,255,255,0.78)">Best Practices</text>

      <circle cx="490" cy="110" r="32" fill="rgba(25,195,125,0.12)" stroke="#19c37d" stroke-width="3"/>
      <text x="490" y="118" text-anchor="middle" font-size="22" font-weight="700" fill="#19c37d">100</text>
      <text x="490" y="170" text-anchor="middle" font-size="11" font-weight="500" fill="rgba(255,255,255,0.78)">SEO</text>
