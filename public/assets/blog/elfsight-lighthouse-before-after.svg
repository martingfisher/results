    <text x="28" y="36" font-size="13" font-weight="600" letter-spacing="1.5" fill="rgba(255,255,255,0.55)">MOBILE</text>

    <!-- Score row: 4 circles -->
    <g>
      <circle cx="110" cy="110" r="32" fill="rgba(25,195,125,0.12)" stroke="#19c37d" stroke-width="3"/>
