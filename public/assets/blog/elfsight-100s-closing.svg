<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">Every page, both axes: 100 across Performance, Accessibility, Best Practices and SEO</title>
  <desc id="desc">Stylised Lighthouse-style report showing four green circles, each containing the number 100, labelled Performance, Accessibility, Best Practices and SEO.</desc>

  <rect width="1200" height="580" fill="#070630"/>

  <!-- Section eyebrow -->
  <text x="600" y="80" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" font-weight="600" fill="#d6262a" letter-spacing="2">RESULT</text>

  <!-- Headline -->
  <text x="600" y="130" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Every page. Both axes.</text>

  <!-- Four circles -->
  <g transform="translate(150, 220)">
    <!-- Performance -->
    <g transform="translate(0, 0)">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#19c37d" stroke-width="10"/>
      <text x="100" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="56" font-weight="700" fill="#19c37d">100</text>
      <text x="100" y="240" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Performance</text>
    </g>

    <!-- Accessibility -->
    <g transform="translate(240, 0)">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#19c37d" stroke-width="10"/>
      <text x="100" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="56" font-weight="700" fill="#19c37d">100</text>
      <text x="100" y="240" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Accessibility</text>
    </g>

    <!-- Best Practices -->
    <g transform="translate(480, 0)">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#19c37d" stroke-width="10"/>
      <text x="100" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="56" font-weight="700" fill="#19c37d">100</text>
      <text x="100" y="240" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Best Practices</text>
    </g>

    <!-- SEO -->
    <g transform="translate(720, 0)">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#19c37d" stroke-width="10"/>
      <text x="100" y="118" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="56" font-weight="700" fill="#19c37d">100</text>
      <text x="100" y="240" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">SEO</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="600" y="540" text-anchor="middle" font-family="'DM Sans', system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)">
    Lighthouse mobile + desktop, every page of resultsyoucanmeasure.co.uk — 27 May 2026.
  </text>
</svg>
