<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>F8 v3 Board</title>
<style>
:root { --bg:#d8d9de; --line:#c2c5cc; --head:#eceef2; }

iframe{width:100%;height:2150px;border:0;display:block;background:#fff}
