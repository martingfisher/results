<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F8 High-Fidelity Wireframe Board</title>
  <style>
    :root {
      --bg: #dcdcdf;
      --line: #c6c6cb;
      --head: #f1f1f3;
      --text: #2d2d32;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .top {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #e7e7ea;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .wrap {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(6, 420px);
      gap: 14px;
      align-items: start;
      overflow-x: auto;
      min-height: calc(100vh - 44px);
    }

    .col {
      background: #ededf0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    .head {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #55555d;
      padding: 9px 10px;
      border-bottom: 1px solid #d5d5da;
      background: var(--head);
    }

    iframe {
      width: 100%;
      height: 2100px;
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="top">F8 Group • Styled Wireframe Board • Webflow/Figma Template Direction</div>
  <div class="wrap">
    <div class="col"><div class="head">Home</div><iframe src="./home.html"></iframe></div>
    <div class="col"><div class="head">Who We Help</div><iframe src="./who-we-help.html"></iframe></div>
    <div class="col"><div class="head">Developers</div><iframe src="./developers.html"></iframe></div>
    <div class="col"><div class="head">Services</div><iframe src="./services.html"></iframe></div>
    <div class="col"><div class="head">How It Works</div><iframe src="./how-it-works.html"></iframe></div>
    <div class="col"><div class="head">Contact</div><iframe src="./contact.html"></iframe></div>
  </div>
</body>
</html>
